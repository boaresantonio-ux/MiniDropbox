<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Dropbox - Entrar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg p-4 p-md-5 bg-white">
                    <div class="text-center mb-4">
                        <div class="display-4 text-primary mb-2"><i class="bi bi-box-seam-fill"></i></div>
                        <h3 class="fw-bold text-dark">Mini Dropbox</h3>
                        <p class="text-muted">Aceda aos seus ficheiros em qualquer lugar</p>
                    </div>
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}{% for cat, msg in messages %}<div class="alert alert-{{cat}} alert-dismissible fade show" role="alert">{{msg}}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>{% endfor %}{% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="form-floating mb-3">
                            <input type="email" name="email" class="form-control" id="floatingEmail" placeholder="nome@exemplo.com" required>
                            <label for="floatingEmail"><i class="bi bi-envelope me-2"></i>E-mail</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Palavra-passe" required>
                            <label for="floatingPassword"><i class="bi bi-lock me-2"></i>Palavra-passe</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill shadow-sm mt-2">Iniciar Sessão</button>
                    </form>
                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">Novo por aqui? <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold">Criar conta</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
