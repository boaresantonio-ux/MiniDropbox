<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Dropbox - Definições</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">
    <nav class="navbar navbar-light bg-white py-3 shadow-sm mb-5">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-dark d-flex align-items-center" href="{{ url_for('dashboard') }}">
                <i class="bi bi-arrow-left-short fs-2 me-1"></i> Definições de Perfil
            </a>
        </div>
    </nav>
    <div class="container">
        <div class="row justify-content-center">
            
                    <h4 class="fw-bold mb-4">Gerir Conta</h4>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}{% for cat, msg in messages %}<div class="alert alert-{{cat}} shadow-sm">{{msg}}
                    </div>{% endfor %}{% endif %}
                    {% endwith %}

                    <form action="{{ url_for('profile') }}" method="POST" enctype="multipart/form-data">

                        <div class="text-center mb-4">

                            <img id="preview" src="{{ url_for('static',
             filename='uploads/profiles/' + current_user.profile_image) }}"
                                class="rounded-circle shadow border border-3 border-primary" width="170" height="170"
                                style="object-fit:cover;">

                            <div class="mb-4 mt-3">

                                <label class="form-label text-secondary small fw-bold">
                                    Foto de Perfil
                                </label>

                                <input type="file" name="profile_image" class="form-control" accept="image/*">

                            </div>

                        </div>

                        <h4 class="fw-bold mb-4">Gerir Conta</h4>

                        <div class="mb-3">
                            <label class="form-label">Nome de Utilizador</label>
                            <input type="text" name="username" class="form-control" value="{{ current_user.username }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" value="{{ current_user.email }}" readonly>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Nova Palavra-passe</label>
                            <input type="password" name="password" class="form-control">
                        </div>

                        <button class="btn btn-primary w-100">
                            Guardar Alterações
                        </button>

                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
